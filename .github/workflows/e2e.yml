name: E2E

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  journeys:
    name: Cucumber E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Restish
        run: |
          version=0.21.2
          archive="restish-${version}-linux-amd64.tar.gz"
          curl -fsSL "https://github.com/rest-sh/restish/releases/download/v${version}/${archive}" -o "$archive"
          curl -fsSL "https://github.com/rest-sh/restish/releases/download/v${version}/checksums.txt" -o checksums.txt
          grep "  ${archive}$" checksums.txt | sha256sum --check -
          tar -xzf "$archive"
          sudo install restish /usr/local/bin/restish
          restish --version

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Cucumber E2E
        run: pnpm run test:e2e

      - name: Upload Cucumber evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-evidence
          path: |
            cucumber-report
          if-no-files-found: ignore
