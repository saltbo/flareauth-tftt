name = "flareauth-tftt"
main = "./server/worker.ts"
compatibility_date = "2026-04-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[vars]
EMAIL_FROM = "noreply@tftt.cc"
EMAIL_FROM_NAME = "TFTTAuth"

[assets]
binding = "ASSETS"
directory = "./dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/.well-known/*"]

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@example.com"]

[[r2_buckets]]
binding = "ASSET_BUCKET"
bucket_name = "flareauth-assets-tftt"

[[d1_databases]]
binding = "DB"
database_name = "flareauth-tftt"
database_id = "4aad3c2f-4ec4-4b0e-a9ed-b0696e4da76f"
migrations_dir = "./migrations"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "flareauth-email-tftt"

[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true
