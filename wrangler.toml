name = "flareauth"
main = "./workers/bootstrap.ts"
compatibility_date = "2026-04-12"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

[vars]
EMAIL_FROM = "noreply@example.com"
EMAIL_FROM_NAME = "FlareAuth"

[assets]
binding = "ASSETS"
directory = "./dist/client"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/.well-known/*", "/admin", "/admin/*"]

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["noreply@example.com"]

[[r2_buckets]]
binding = "ASSET_BUCKET"
bucket_name = "flareauth-assets"

[[d1_databases]]
binding = "DB"
database_name = "flareauth"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "./migrations"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "flareauth-email"

[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true
