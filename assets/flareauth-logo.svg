<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">FlareAuth logo</title>
  <desc id="desc">A FlareAuth Fa monogram wrapped by a Cloudflare-orange and charcoal circular swirl.</desc>
  <defs>
